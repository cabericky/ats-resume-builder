<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Resume Builder</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="editor">
      <h1>Resume Builder</h1>

      <div class="section-group">
        <div class="section-header">
          <h2>Personal Info</h2>
        </div>
        <div class="input-group">
          <label>Full Name</label>
          <input
            type="text"
            id="name"
            oninput="updateResume()"
            placeholder="John Doe"
          />
        </div>
        <div class="input-group">
          <label>Contact Info</label>
          <input
            type="text"
            id="contact"
            oninput="updateResume()"
            placeholder="john@email.com | (123) 456-7890 | New York, NY"
          />
        </div>
      </div>

      <div class="section-group">
        <div class="section-header">
          <h2>Professional Summary</h2>
          <label class="toggle-label">
            <input
              type="checkbox"
              checked
              onchange="toggleSection('preview-summary-section')"
            />
            <span class="toggle-switch"></span> Include
          </label>
        </div>
        <textarea
          id="summary"
          rows="4"
          oninput="updateResume()"
          placeholder="Experienced professional with a track record of..."
        ></textarea>
      </div>

      <div class="section-group">
        <div class="section-header">
          <h2>Skills</h2>
          <label class="toggle-label">
            <input
              type="checkbox"
              checked
              onchange="toggleSection('preview-skills-section')"
            />
            <span class="toggle-switch"></span> Include
          </label>
        </div>
        <textarea
          id="skills"
          rows="3"
          oninput="updateResume()"
          placeholder="Python, JavaScript, Project Management, SQL..."
        ></textarea>
      </div>

      <div class="section-group">
        <div class="section-header">
          <h2>Work Experience</h2>
          <label class="toggle-label">
            <input
              type="checkbox"
              checked
              onchange="toggleSection('preview-work-section')"
            />
            <span class="toggle-switch"></span> Include
          </label>
        </div>
        <div id="work-container"></div>
        <button class="btn btn-add" onclick="addWork()">
          + Add Experience
        </button>
      </div>

      <div class="section-group">
        <div class="section-header">
          <h2>Education</h2>
          <label class="toggle-label">
            <input
              type="checkbox"
              checked
              onchange="toggleSection('preview-edu-section')"
            />
            <span class="toggle-switch"></span> Include
          </label>
        </div>
        <div id="edu-container"></div>
        <button class="btn btn-add" onclick="addEducation()">
          + Add Education
        </button>
      </div>

      <div class="section-group">
        <div class="section-header">
          <h2>Certifications</h2>
          <label class="toggle-label">
            <input
              type="checkbox"
              checked
              onchange="toggleSection('preview-cert-section')"
            />
            <span class="toggle-switch"></span> Include
          </label>
        </div>
        <div id="cert-container"></div>
        <button class="btn btn-add" onclick="addCert()">
          + Add Certification
        </button>
      </div>

      <button class="btn btn-download" onclick="downloadPDF()">
        Download PDF
      </button>
    </div>

    <div class="preview-container">
      <div id="resume-preview">
        <div class="ats-name" id="p-name">YOUR NAME</div>
        <div class="ats-contact" id="p-contact">
          email@example.com | 123-456-7890
        </div>

        <div id="preview-summary-section">
          <div class="ats-section-title">Professional Summary</div>
          <div class="ats-content" id="p-summary">
            Your summary will appear here...
          </div>
        </div>

        <div id="preview-skills-section">
          <div class="ats-section-title">Skills</div>
          <div class="ats-content" id="p-skills">
            Your skills will appear here...
          </div>
        </div>

        <div id="preview-work-section">
          <div class="ats-section-title">Work Experience</div>
          <div id="p-work"></div>
        </div>

        <div id="preview-edu-section">
          <div class="ats-section-title">Education</div>
          <div id="p-education"></div>
        </div>

        <div id="preview-cert-section">
          <div class="ats-section-title">Certifications</div>
          <div id="p-certs"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
